<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GetContacts Clone</title>
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #06b6d4;
            --bg-body: #f1f5f9;
            --text-main: #1e293b;
            --secondary: #64748b;
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body {
            background: linear-gradient(120deg, var(--primary), var(--accent));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .login-card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .icon-box {
            width: 60px;
            height: 60px;
            background: #eff6ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        h2 { margin-bottom: 1.5rem; color: var(--text-main); font-weight: 700; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; color: var(--secondary); }
        .form-input {
            width: 100%; padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 1rem; outline: none; transition: 0.2s;
        }
        .form-input:focus { border-color: var(--primary); background: #f8fafc; }
        .btn-primary {
            width: 100%; padding: 1rem;
            background: var(--primary); color: white;
            border: none; border-radius: 12px;
            font-weight: 600; font-size: 1rem;
            cursor: pointer; margin-top: 1rem;
        }
        .btn-primary:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon-box">
            <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <h2>Login Sistem</h2>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" class="form-input" required placeholder="Masukkan username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-input" required placeholder="Masukkan password">
            </div>
            <button type="submit" class="btn-primary">Masuk</button>
        </form>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            // Formalitas login sesuai permintaanmu
            if (u === 'admin' && p === 'admin') {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'tugas6.html'; // Pindah ke halaman utama
            } else {
                alert('Username atau Password salah!');
            }
        }
    </script>
</body>
</html>
