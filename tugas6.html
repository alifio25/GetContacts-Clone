        // --- Logic Utama ---

        let contacts = [];

        // 1. Inisialisasi Data (Parse CSV + Load LocalStorage)
        function initApp() {
            const storedData = localStorage.getItem('myContacts');
            if (storedData) {
                contacts = JSON.parse(storedData);
            } else {
                // Parse CSV jika belum ada data di lokal
                contacts = parseCSV(rawCSVData);
                saveData();
            }
            renderContacts(contacts);
            updateStats();
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            let data = [];
            // Lewati header (index 0)
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // Split berdasarkan " | "
                const cols = line.split(' | ');
                if (cols.length < 3) continue; // Skip baris rusak

                // Mapping index sesuai format: ID | Nama | No | Email | Label
                const name = cols[1].trim() || "Unknown";
                const phone = cols[2].trim();
                const email = cols[3].trim() || "";
                const label = cols[4] ? cols[4].replace('* ', '').trim() : "myContacts";

                data.push({
                    id: i,
                    name: name,
                    phone: phone,
                    email: email,
                    category: label
                });
            }
            return data;
        }

        function saveData() {
            localStorage.setItem('myContacts', JSON.stringify(contacts));
            updateStats();
        }

            document.getElementById('totalStats').innerText = `${contacts.length} Kontak Tersimpan`;
        }

            grid.innerHTML = '';

            // Urutkan A-Z
            data.sort((a, b) => a.name.localeCompare(b.name));

            data.forEach(c => {
                // Generate Inisial & Warna Random Avatar
                const initial = c.name.charAt(0).toUpperCase();
                const colors = ['#dbeafe', '#fce7f3', '#dcfce7', '#ffedd5', '#f3e8ff'];
                const color = colors[c.name.length % colors.length];

                const card = document.createElement('div');
                card.className = 'contact-card';
                card.innerHTML = `
                    <div class="avatar" style="background:${color}; color: #333; cursor: pointer;" onclick="viewDetail(${c.id})">${initial}</div>
                    <div class="info">
                        <div class="name">${escapeHtml(c.name)}</div>
                        <div class="phone">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.05 12.05 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.05 12.05 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            ${escapeHtml(c.phone)}
                        </div>
                        <span class="label-badge">${escapeHtml(c.category)}</span>
                    </div>
                    <div class="actions">
                        <button class="btn-icon" onclick="editContact(${c.id})" title="Edit">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button class="btn-icon delete" onclick="deleteContact(${c.id})" title="Hapus">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 3. CRUD Operations
        function openAddModal() {
            document.getElementById('contactForm').reset();
            document.getElementById('contactId').value = '';
            document.getElementById('modalTitle').innerText = 'Tambah Kontak Baru';
            openModal('formModal');
        }

        function editContact(id) {
            const c = contacts.find(x => x.id == id);
            if (!c) return;
            document.getElementById('contactId').value = c.id;
            document.getElementById('nameInput').value = c.name;
            document.getElementById('phoneInput').value = c.phone;
            document.getElementById('emailInput').value = c.email;
            document.getElementById('catInput').value = c.category;
            document.getElementById('igInput').value = c.ig || '';
            document.getElementById('fbInput').value = c.fb || '';
            document.getElementById('modalTitle').innerText = 'Edit Kontak';
            openModal('formModal');
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('contactId').value;
            const newData = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('nameInput').value,
                phone: document.getElementById('phoneInput').value,
                email: document.getElementById('emailInput').value,
                category: document.getElementById('catInput').value,
                ig: document.getElementById('igInput').value,
                fb: document.getElementById('fbInput').value
            };

            if (id) {
                // Update
                const index = contacts.findIndex(x => x.id == id);
                contacts[index] = newData;
            } else {
                // Insert
                contacts.push(newData);
            }

            saveData();
            renderContacts(contacts);
            closeModal('formModal');
        }

        function deleteContact(id) {
            if(confirm('Yakin hapus kontak ini?')) {
                contacts = contacts.filter(x => x.id != id);
                saveData();
                renderContacts(contacts);
            }
        }

        function filterContacts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = contacts.filter(c => 
                c.name.toLowerCase().includes(q) || 
                c.phone.includes(q)
            );
            renderContacts(filtered);
        }

        function viewDetail(id) {
            const c = contacts.find(x => x.id == id);
            if (!c) return;
        
            document.getElementById('detailName').innerText = c.name;
            document.getElementById('detailPhone').innerText = c.phone;
            document.getElementById('detailAvatar').innerText = c.name.charAt(0).toUpperCase();
            
            const colors = ['#dbeafe', '#fce7f3', '#dcfce7', '#ffedd5', '#f3e8ff'];
            document.getElementById('detailAvatar').style.background = colors[c.name.length % colors.length];
        
            const socialsDiv = document.getElementById('detailSocials');
            socialsDiv.innerHTML = ''; 
            const btnStyle = "color: var(--primary); display: flex; align-items: center; gap: 8px; text-decoration: none; font-weight: 600; padding: 0.6rem 1.2rem; border: 2px solid var(--primary); border-radius: 12px; transition: 0.2s;";
        
            if (c.ig) {
                socialsDiv.innerHTML += `
                <a href="${c.ig}" target="_blank" style="${btnStyle}">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    Instagram
                </a>`;
            }
            if (c.fb) {
                socialsDiv.innerHTML += `
                <a href="${c.fb}" target="_blank" style="${btnStyle}">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
                    Facebook
                </a>`;
            }
            if (!c.ig && !c.fb) {
                socialsDiv.innerHTML = `<p style="font-size: 0.85rem; color: var(--text-muted);">Belum ada sosial media</p>`;
            }
            openModal('detailModal');
        }

        // 4. SQL Generator (Fitur Khusus untuk Dosen)
    function openSqlModal() {
            let sql = `-- Tabel Database untuk Aplikasi Kontak\n`;
            sql += `CREATE DATABASE IF NOT EXISTS kontak_db;\nUSE kontak_db;\n\n`;
            sql += `CREATE TABLE contacts (\n  id INT AUTO_INCREMENT PRIMARY KEY,\n  name VARCHAR(100) NOT NULL,\n  phone VARCHAR(20) NOT NULL,\n  email VARCHAR(100),\n  category VARCHAR(50),\n  ig VARCHAR(100),\n  fb VARCHAR(100)\n);\n\n`;
            sql += `-- Data saat ini (${contacts.length} records)\n`;
            sql += `INSERT INTO contacts (name, phone, email, category, ig, fb) VALUES\n`;

            const values = contacts.map(c => {
                const n = c.name.replace(/'/g, "\\'");
                const p = c.phone.replace(/'/g, "\\'");
                const e = c.email ? `'${c.email}'` : 'NULL';
                const cat = c.category ? `'${c.category}'` : 'NULL';
                const ig = c.ig ? `'${c.ig}'` : 'NULL';
                const fb = c.fb ? `'${c.fb}'` : 'NULL';
                return `('${n}', '${p}', ${e}, ${cat}, ${ig}, ${fb})`;
            });
            
            sql += values.join(',\n') + ';';

            document.getElementById('sqlCode').innerText = sql;
            openModal('sqlModal');
        }

        function copySql() {
            const text = document.getElementById('sqlCode').innerText;
            navigator.clipboard.writeText(text).then(() => alert('SQL berhasil disalin!'));
        }

        // Utilities
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function escapeHtml(text) { if(!text) return ''; return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        // Jalankan saat load
        initApp();

    </script>
</body>
</html>
